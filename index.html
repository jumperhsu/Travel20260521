<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>20260521-東北11日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #1e293b;
        }

        /* 页签栏容器 */
        .tabs-wrapper {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            flex-shrink: 0;
            padding: 0.75rem 1.25rem 0 1.25rem;
        }

        .tabs-scroll {
            overflow-x: auto;
            overflow-y: visible;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .tabs-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-width: min-content;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid transparent;
        }

        /* 页签按钮样式 */
        .tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 2rem;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }

        .tab-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: #2c3e66;
            color: white;
            box-shadow: 0 4px 10px rgba(44, 62, 102, 0.2);
            text-shadow: 0 1px 0 rgba(0,0,0,0.05);
        }

        /* 针对长标题保持可读性 */
        .tab-btn:focus-visible {
            outline: 2px solid #2c3e66;
            outline-offset: 2px;
        }

        /* iframe 容器区域 */
        .iframe-container {
            flex: 1;
            position: relative;
            background: #eef2f6;
            margin: 0;
            width: 100%;
            overflow: auto;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        /* 嵌入的表格 */
        .sheet-iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #fff;
        }

        /* 加载指示器 (轻量优雅) */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 247, 250, 0.9);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .loading-spinner {
            background: white;
            padding: 1rem 1.8rem;
            border-radius: 3rem;
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 500;
            color: #2c3e66;
            border: 1px solid #e2edf2;
        }

        .spinner-circle {
            width: 1.4rem;
            height: 1.4rem;
            border: 3px solid #cbd5e1;
            border-top-color: #2c3e66;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式调整: 移动端更紧凑的页签 */
        @media (max-width: 680px) {
            .tabs-wrapper {
                padding: 0.5rem 1rem 0 1rem;
            }
            .tab-btn {
                padding: 0.45rem 1rem;
                font-size: 0.8rem;
            }
            .loading-spinner {
                padding: 0.7rem 1.4rem;
                font-size: 0.85rem;
            }
        }

        /* 优雅的滚动条 */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9c3d0;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* 页签区域滚动时保持美观 */
        .tabs-scroll::-webkit-scrollbar {
            height: 4px;
        }
    </style>
</head>
<body>

<div class="tabs-wrapper">
    <div class="tabs-scroll">
        <div class="tabs-list" id="tabsContainer" role="tablist" aria-label="資料頁籤"></div>
    </div>
</div>

<div class="iframe-container" id="iframeContainer">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-circle"></div>
            <span>載入表單中...</span>
        </div>
    </div>
    <iframe class="sheet-iframe" id="sheetIframe" title="旅行資料與工具" frameborder="0" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"></iframe>
</div>

<script>
    // ----- 頁籤數據 -----
    // 原有 Google Sheets 頁籤 (使用 gid)
    // 新增兩個外部網址頁籤: 行程計劃、費用紀錄
    const tabsData = [
        { title: "行程表", gid: "1164452748" },
        { title: "住宿資訊", gid: "387601380" },
        { title: "機票資訊", gid: "1361755418" },
        { title: "費用估算", gid: "28583731" },
        { title: "洗浴中心", gid: "1771845056" },
        { title: "上海住宿", gid: "1597957517" },
        { title: "瀋陽住宿", gid: "1910484059" },
        { title: "哈爾濱住宿", gid: "461233085" },
        { title: "寧波中轉", gid: "329265611" },
        // 新增外部網頁頁籤 (完整URL)
        { title: "行程計劃", externalUrl: "https://jumperhsu.github.io/TravelPlans/ViewPlan.html?versionId=92df65f1-16a4-42b9-9215-227c147e90de" },
        { title: "費用紀錄", externalUrl: "https://jumperhsu.github.io/T-E/" }
    ];

    // Google Sheets 發布的基礎 URL (不包含 gid)
    const BASE_URL = "https://docs.google.com/spreadsheets/u/0/d/e/2PACX-1vQf4lKe2Af05LXYVNJSi46BnsllCOGCS4wUU1-lXXlDQqJm9XwlqvZPAC4pMKsfBC93U8nB6F6QlVCJ/pubhtml/sheet?headers=false&gid=";

    // DOM 元素
    const tabsContainer = document.getElementById('tabsContainer');
    const iframe = document.getElementById('sheetIframe');
    const loadingOverlay = document.getElementById('loadingOverlay');

    let currentActiveTab = null;         // 當前激活的按鈕元素
    let currentUrl = null;               // 當前加載的完整URL (用於避免重複加載)
    let iframeLoadHandler = null;         // 用來管理 load 事件

    // 顯示 loading (確保淡入效果)
    function showLoading() {
        if (loadingOverlay) {
            loadingOverlay.style.opacity = '1';
            loadingOverlay.style.visibility = 'visible';
            loadingOverlay.style.display = 'flex';
        }
    }

    // 隱藏 loading (加載完成後)
    function hideLoading() {
        if (loadingOverlay) {
            loadingOverlay.style.opacity = '0';
            // 等待動畫結束後徹底隱藏，但仍佔位避免閃爍，設為不可見即可
            setTimeout(() => {
                if (loadingOverlay.style.opacity === '0') {
                    loadingOverlay.style.display = 'none';
                }
            }, 200);
        }
    }

    // 重置 iframe load 監聽，每次切換時綁定新的完成事件
    function bindIframeLoadEvent() {
        if (iframeLoadHandler) {
            iframe.removeEventListener('load', iframeLoadHandler);
        }
        iframeLoadHandler = function() {
            // iframe 內容加載完成，隱藏 loading
            hideLoading();
        };
        iframe.addEventListener('load', iframeLoadHandler);
        // 也監聽錯誤事件 (例如網路中斷或無法載入)
        iframe.addEventListener('error', function onError() {
            hideLoading();
            console.warn('iframe 載入失敗，請檢查網路或連結有效性');
        });
    }

    // 獲取頁籤對應的完整URL
    function getTabUrl(tab) {
        if (tab.externalUrl) {
            return tab.externalUrl;
        } else if (tab.gid) {
            return BASE_URL + tab.gid;
        }
        return null;
    }

    // 切換頁籤核心: 更新 iframe src 並管理高亮
    function switchToTab(tab, tabButton) {
        const targetUrl = getTabUrl(tab);
        if (!targetUrl) return;

        // 若點擊的已經是當前頁籤且 iframe 的 src 相同，則不做任何操作 (避免重複加載)
        if (currentUrl === targetUrl && iframe.src === targetUrl) {
            // 但仍然確保高亮是對的 (被點擊時)
            if (currentActiveTab !== tabButton) {
                updateActiveTabStyle(tabButton);
            }
            return;
        }

        // 顯示 loading (新內容載入)
        showLoading();
        // 確保 iframe load 事件綁定 (重新綁定避免舊事件影響)
        bindIframeLoadEvent();

        // 更新 src
        iframe.src = targetUrl;
        // 記錄當前 URL
        currentUrl = targetUrl;

        // 更新頁籤樣式
        updateActiveTabStyle(tabButton);
    }

    // 更新頁籤 active 樣式
    function updateActiveTabStyle(activeButton) {
        if (currentActiveTab) {
            currentActiveTab.classList.remove('active');
            currentActiveTab.setAttribute('aria-selected', 'false');
        }
        activeButton.classList.add('active');
        activeButton.setAttribute('aria-selected', 'true');
        currentActiveTab = activeButton;
    }

    // 動態生成頁籤按鈕 (維護方便，易於擴充)
    function buildTabs() {
        tabsContainer.innerHTML = ''; // 清空容器

        tabsData.forEach((tab, index) => {
            const button = document.createElement('button');
            button.className = 'tab-btn';
            button.textContent = tab.title;
            // 儲存完整的 tab 物件資料 (使用 data-* 存索引，實際切換時透過索引取用)
            button.setAttribute('data-tab-index', index);
            button.setAttribute('role', 'tab');
            button.setAttribute('aria-selected', 'false');
            button.setAttribute('id', `tab-${index}`);
            
            // 點擊事件
            button.addEventListener('click', (e) => {
                e.preventDefault();
                const idx = parseInt(button.getAttribute('data-tab-index'), 10);
                const targetTab = tabsData[idx];
                if (targetTab) {
                    switchToTab(targetTab, button);
                }
            });

            tabsContainer.appendChild(button);
        });
    }

    // 初始化: 設定默認頁籤 (行程表，索引0)
    function initDefaultTab() {
        if (tabsData.length === 0) return;
        const firstTab = tabsData[0];
        const firstButton = tabsContainer.querySelector('.tab-btn');
        if (firstButton && firstTab) {
            const defaultUrl = getTabUrl(firstTab);
            if (defaultUrl) {
                showLoading();
                bindIframeLoadEvent();
                iframe.src = defaultUrl;
                currentUrl = defaultUrl;
                // 高亮第一個按鈕
                firstButton.classList.add('active');
                firstButton.setAttribute('aria-selected', 'true');
                currentActiveTab = firstButton;
            }
        } else {
            // 預防萬一: 直接加載第一個頁籤
            const fallbackTab = tabsData[0];
            const fallbackUrl = getTabUrl(fallbackTab);
            if (fallbackUrl) {
                showLoading();
                bindIframeLoadEvent();
                iframe.src = fallbackUrl;
                currentUrl = fallbackUrl;
            }
        }
    }

    // 預先加載失敗或超時保護: 如果 iframe 超過 10 秒仍未觸發 load，隱藏 loading 避免轉圈圈卡死
    let loadingTimeout = null;
    function setLoadingFallback() {
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(() => {
            // 若 loading 還在顯示，代表可能載入極慢或發生錯誤，強制隱藏，避免介面凍結
            if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                hideLoading();
                console.warn('載入逾時，請檢查網路或重新整理頁面');
            }
        }, 10000); // 10秒逾時
    }

    // 擴展原本的 bindIframeLoadEvent, 增加超時重置
    const originalBind = bindIframeLoadEvent;
    window.bindIframeLoadEvent = function() {
        if (iframeLoadHandler) {
            iframe.removeEventListener('load', iframeLoadHandler);
        }
        iframeLoadHandler = function() {
            hideLoading();
            if (loadingTimeout) clearTimeout(loadingTimeout);
        };
        iframe.addEventListener('load', iframeLoadHandler);
        iframe.addEventListener('error', function onError() {
            hideLoading();
            if (loadingTimeout) clearTimeout(loadingTimeout);
        });
    };
    // 覆蓋原函數，同時保留原有行為
    bindIframeLoadEvent = window.bindIframeLoadEvent;

    // 重新封裝 showLoading 時啟動計時器
    const originalShow = showLoading;
    window.showLoading = function() {
        if (loadingTimeout) clearTimeout(loadingTimeout);
        originalShow();
        setLoadingFallback();
    };
    showLoading = window.showLoading;

    // 整合初始化: 生成按鈕、設定預設、綁定事件強化
    function init() {
        buildTabs();
        // 綁定 iframe 默認事件與超時防護
        bindIframeLoadEvent();
        // 設置默認頁籤加載
        initDefaultTab();
        // 如果已經顯示loading但沒有觸發load (網路慢) 超時會自動關閉
    }

    // 啟動所有功能
    init();

    // 當頁面完全加載後，若iframe已經有內容但loading未關閉，強制關閉 (保險)
    window.addEventListener('load', () => {
        setTimeout(() => {
            if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                // 檢查iframe是否已經有內容 (src不為空且不是about:blank)
                if (iframe && iframe.src && iframe.src !== 'about:blank') {
                    hideLoading();
                }
            }
        }, 800);
    });
</script>
</body>
</html>
