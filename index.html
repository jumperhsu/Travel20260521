<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>20260521-東北11日</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Roboto', 'Noto Sans', sans-serif;
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            color: #1e293b;
        }

        /* 主頁籤欄容器 */
        .tabs-wrapper {
            background: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.02);
            flex-shrink: 0;
            padding: 0.75rem 1.25rem 0 1.25rem;
        }

        .tabs-scroll {
            overflow-x: auto;
            overflow-y: visible;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .tabs-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            min-width: min-content;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid transparent;
        }

        /* 主頁籤按鈕樣式 */
        .tab-btn {
            background: #f1f5f9;
            border: none;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 2rem;
            color: #334155;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            letter-spacing: 0.3px;
            backdrop-filter: blur(2px);
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }

        .tab-btn:hover {
            background: #e2e8f0;
            color: #0f172a;
            transform: translateY(-1px);
        }

        .tab-btn.active {
            background: #2c3e66;
            color: white;
            box-shadow: 0 4px 10px rgba(44, 62, 102, 0.2);
            text-shadow: 0 1px 0 rgba(0,0,0,0.05);
        }

        /* 子頁籤區域 (參考資料專用) */
        .sub-tabs-wrapper {
            background: #f8fafc;
            border-bottom: 1px solid #e2edf2;
            flex-shrink: 0;
            padding: 0.5rem 1.25rem 0 1.25rem;
            transition: all 0.2s ease;
        }

        .sub-tabs-scroll {
            overflow-x: auto;
            overflow-y: visible;
            scrollbar-width: thin;
            -webkit-overflow-scrolling: touch;
        }

        .sub-tabs-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem;
            min-width: min-content;
            padding-bottom: 0.5rem;
        }

        /* 子頁籤按鈕樣式 (稍小、底色不同) */
        .sub-tab-btn {
            background: #eef2ff;
            border: none;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            border-radius: 2rem;
            color: #2c3e66;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            box-shadow: 0 1px 1px rgba(0,0,0,0.02);
        }

        .sub-tab-btn:hover {
            background: #e0e7ff;
            transform: translateY(-1px);
        }

        .sub-tab-btn.active {
            background: #2c3e66;
            color: white;
            box-shadow: 0 2px 6px rgba(44, 62, 102, 0.2);
        }

        /* iframe 容器区域 */
        .iframe-container {
            flex: 1;
            position: relative;
            background: #eef2f6;
            margin: 0;
            width: 100%;
            overflow: auto;
            box-shadow: inset 0 1px 3px rgba(0,0,0,0.02);
        }

        .sheet-iframe {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
            background: #fff;
        }

        /* 加载指示器 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(245, 247, 250, 0.9);
            backdrop-filter: blur(3px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.2s ease;
            pointer-events: none;
        }

        .loading-spinner {
            background: white;
            padding: 1rem 1.8rem;
            border-radius: 3rem;
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.15);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            font-weight: 500;
            color: #2c3e66;
            border: 1px solid #e2edf2;
        }

        .spinner-circle {
            width: 1.4rem;
            height: 1.4rem;
            border: 3px solid #cbd5e1;
            border-top-color: #2c3e66;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 响应式 */
        @media (max-width: 680px) {
            .tabs-wrapper {
                padding: 0.5rem 1rem 0 1rem;
            }
            .tab-btn {
                padding: 0.45rem 1rem;
                font-size: 0.8rem;
            }
            .sub-tabs-wrapper {
                padding: 0.4rem 1rem 0 1rem;
            }
            .sub-tab-btn {
                padding: 0.35rem 0.85rem;
                font-size: 0.75rem;
            }
            .loading-spinner {
                padding: 0.7rem 1.4rem;
                font-size: 0.85rem;
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f6;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b9c3d0;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body>

<div class="tabs-wrapper">
    <div class="tabs-scroll">
        <div class="tabs-list" id="tabsContainer" role="tablist" aria-label="主頁籤"></div>
    </div>
</div>

<!-- 子頁籤容器 (預設隱藏，僅在點擊「參考資料」時顯示) -->
<div class="sub-tabs-wrapper" id="subTabsWrapper" style="display: none;">
    <div class="sub-tabs-scroll">
        <div class="sub-tabs-list" id="subTabsContainer" role="tablist" aria-label="參考資料子頁籤"></div>
    </div>
</div>

<div class="iframe-container" id="iframeContainer">
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner">
            <div class="spinner-circle"></div>
            <span>載入表單中...</span>
        </div>
    </div>
    <iframe class="sheet-iframe" id="sheetIframe" title="旅行資料與工具" frameborder="0" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals allow-downloads"></iframe>
</div>

<script>
    // ----- 頁籤數據結構 -----
    // 普通頁籤 (直接加載內容)
    // 參考資料頁籤為父級，內含子頁籤
    const tabsData = [
        { title: "行程表", type: "sheet", gid: "1164452748" },
        { title: "住宿資訊", type: "sheet", gid: "387601380" },
        { title: "機票資訊", type: "sheet", gid: "1361755418" },
        { title: "費用估算", type: "sheet", gid: "28583731" },
        {
            title: "參考資料",
            type: "parent",
            children: [
                { title: "洗浴中心", gid: "1771845056" },
                { title: "上海住宿", gid: "1597957517" },
                { title: "瀋陽住宿", gid: "1910484059" },
                { title: "哈爾濱住宿", gid: "461233085" },
                { title: "寧波中轉", gid: "329265611" }
            ]
        },
        { title: "行程計劃", type: "external", url: "https://jumperhsu.github.io/TravelPlans/ViewPlan.html?versionId=92df65f1-16a4-42b9-9215-227c147e90de" },
        { title: "費用紀錄", type: "external", url: "https://jumperhsu.github.io/T-E/" }
    ];

    // Google Sheets 基礎 URL
    const BASE_URL = "https://docs.google.com/spreadsheets/u/0/d/e/2PACX-1vQf4lKe2Af05LXYVNJSi46BnsllCOGCS4wUU1-lXXlDQqJm9XwlqvZPAC4pMKsfBC93U8nB6F6QlVCJ/pubhtml/sheet?headers=false&gid=";

    // DOM 元素
    const tabsContainer = document.getElementById('tabsContainer');
    const subTabsWrapper = document.getElementById('subTabsWrapper');
    const subTabsContainer = document.getElementById('subTabsContainer');
    const iframe = document.getElementById('sheetIframe');
    const loadingOverlay = document.getElementById('loadingOverlay');

    let currentActiveTabBtn = null;       // 當前激活的主頁籤按鈕
    let currentUrl = null;                // 當前 iframe 加載的完整 URL
    let iframeLoadHandler = null;
    let loadingTimeout = null;

    // 子頁籤相關狀態
    let currentParentTab = null;           // 當前打開的父頁籤對象 (參考資料)
    let currentSubTabIndex = 0;            // 當前選中的子頁籤索引
    let subTabButtons = [];                // 子頁籤按鈕 DOM 列表

    // 顯示/隱藏 loading
    function showLoading() {
        if (loadingOverlay) {
            loadingOverlay.style.opacity = '1';
            loadingOverlay.style.visibility = 'visible';
            loadingOverlay.style.display = 'flex';
        }
        // 超時保護
        if (loadingTimeout) clearTimeout(loadingTimeout);
        loadingTimeout = setTimeout(() => {
            if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                hideLoading();
                console.warn('載入逾時，請檢查網路');
            }
        }, 10000);
    }

    function hideLoading() {
        if (loadingOverlay) {
            loadingOverlay.style.opacity = '0';
            setTimeout(() => {
                if (loadingOverlay.style.opacity === '0') {
                    loadingOverlay.style.display = 'none';
                }
            }, 200);
        }
        if (loadingTimeout) clearTimeout(loadingTimeout);
    }

    // iframe load 事件綁定
    function bindIframeLoadEvent() {
        if (iframeLoadHandler) {
            iframe.removeEventListener('load', iframeLoadHandler);
        }
        iframeLoadHandler = function() {
            hideLoading();
        };
        iframe.addEventListener('load', iframeLoadHandler);
        iframe.addEventListener('error', function onError() {
            hideLoading();
            console.warn('iframe 載入失敗');
        });
    }

    // 加載指定 URL 到 iframe
    function loadUrl(url) {
        if (currentUrl === url && iframe.src === url) return;
        showLoading();
        bindIframeLoadEvent();
        iframe.src = url;
        currentUrl = url;
    }

    // 獲取頁籤對應的 URL (普通 sheet 或外部)
    function getTabUrl(tab) {
        if (tab.type === "sheet" && tab.gid) {
            return BASE_URL + tab.gid;
        } else if (tab.type === "external" && tab.url) {
            return tab.url;
        }
        return null;
    }

    // 加載子頁籤內容 (根據子頁籤物件)
    function loadSubTabContent(subTab) {
        if (!subTab || !subTab.gid) return;
        const url = BASE_URL + subTab.gid;
        loadUrl(url);
    }

    // 更新主頁籤 active 樣式
    function updateMainTabActive(activeButton) {
        if (currentActiveTabBtn) {
            currentActiveTabBtn.classList.remove('active');
            currentActiveTabBtn.setAttribute('aria-selected', 'false');
        }
        activeButton.classList.add('active');
        activeButton.setAttribute('aria-selected', 'true');
        currentActiveTabBtn = activeButton;
    }

    // 渲染子頁籤按鈕 (根據 parentTab)
    function renderSubTabs(parentTab) {
        subTabsContainer.innerHTML = '';
        if (!parentTab || !parentTab.children) return;

        const children = parentTab.children;
        subTabButtons = [];
        children.forEach((child, idx) => {
            const btn = document.createElement('button');
            btn.className = 'sub-tab-btn';
            btn.textContent = child.title;
            btn.setAttribute('data-sub-index', idx);
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                // 更新子頁籤高亮
                setActiveSubTab(idx);
                // 加載內容
                loadSubTabContent(child);
                currentSubTabIndex = idx;
            });
            subTabsContainer.appendChild(btn);
            subTabButtons.push(btn);
        });

        // 設置默認高亮
        if (children.length > 0) {
            setActiveSubTab(currentSubTabIndex);
            // 加載當前選中的子頁籤內容
            const defaultChild = children[currentSubTabIndex];
            if (defaultChild) {
                loadSubTabContent(defaultChild);
            }
        }
    }

    // 設置子頁籤高亮
    function setActiveSubTab(index) {
        subTabButtons.forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('active');
                btn.setAttribute('aria-selected', 'true');
            } else {
                btn.classList.remove('active');
                btn.setAttribute('aria-selected', 'false');
            }
        });
    }

    // 顯示子頁籤區域
    function showSubTabs(parentTab) {
        currentParentTab = parentTab;
        renderSubTabs(parentTab);
        subTabsWrapper.style.display = 'block';
    }

    // 隱藏子頁籤區域
    function hideSubTabs() {
        subTabsWrapper.style.display = 'none';
        currentParentTab = null;
    }

    // 切換主頁籤
    function switchToMainTab(tab, button) {
        // 處理父級頁籤 (參考資料)
        if (tab.type === 'parent') {
            // 顯示子頁籤並加載對應內容
            if (currentParentTab !== tab) {
                // 切換到不同的父頁籤（目前只有參考資料，但保留通用性）
                // 重置子頁籤索引為0
                currentSubTabIndex = 0;
                showSubTabs(tab);
            } else {
                // 相同父頁籤，但可能子頁籤區域已顯示，只需確保內容不重複加載
                // 但若子頁籤區域已顯示且已有內容，則無需操作，但仍要更新高亮
                if (subTabsWrapper.style.display !== 'block') {
                    showSubTabs(tab);
                }
            }
            updateMainTabActive(button);
            return;
        }

        // 普通頁籤 (sheet 或 external)
        // 切換時隱藏子頁籤區域
        hideSubTabs();

        const url = getTabUrl(tab);
        if (url) {
            loadUrl(url);
        }
        updateMainTabActive(button);
    }

    // 生成主頁籤按鈕
    function buildMainTabs() {
        tabsContainer.innerHTML = '';
        tabsData.forEach((tab, index) => {
            const button = document.createElement('button');
            button.className = 'tab-btn';
            button.textContent = tab.title;
            button.setAttribute('data-tab-index', index);
            button.setAttribute('role', 'tab');
            button.setAttribute('aria-selected', 'false');
            button.addEventListener('click', (e) => {
                e.preventDefault();
                const targetTab = tabsData[index];
                switchToMainTab(targetTab, button);
            });
            tabsContainer.appendChild(button);
        });
    }

    // 初始化默認頁籤 (行程表)
    function initDefault() {
        if (tabsData.length === 0) return;
        // 尋找第一個非 parent 的頁籤作為默認（行程表）
        let defaultIndex = 0;
        for (let i = 0; i < tabsData.length; i++) {
            if (tabsData[i].type !== 'parent') {
                defaultIndex = i;
                break;
            }
        }
        const defaultTab = tabsData[defaultIndex];
        const defaultButton = tabsContainer.children[defaultIndex];
        if (defaultButton && defaultTab) {
            const url = getTabUrl(defaultTab);
            if (url) {
                loadUrl(url);
            }
            updateMainTabActive(defaultButton);
        }
        // 確保子頁籤一開始是隱藏的
        hideSubTabs();
    }

    // 綁定全局事件與初始化
    function init() {
        buildMainTabs();
        bindIframeLoadEvent();
        initDefault();
        // 如果某些意外導致 loading 未關閉，最終保險
        window.addEventListener('load', () => {
            setTimeout(() => {
                if (loadingOverlay && loadingOverlay.style.display !== 'none') {
                    hideLoading();
                }
            }, 800);
        });
    }

    init();
</script>
</body>
</html>
