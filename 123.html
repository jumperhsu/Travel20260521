<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>旅遊計畫 - 自動定位版</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: -apple-system, sans-serif; }
        #status-bar {
            position: fixed; top: 0; width: 100%; background: #2196F3; color: white;
            text-align: center; padding: 12px; font-weight: bold; z-index: 10000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.5s;
        }
        #content { margin-top: 45px; width: 100%; }
        /* 讓表格在手機上可以橫向捲動 */
        #content table { width: 100% !important; border-collapse: collapse; }
        .today-highlight { 
            background-color: #fff176 !important; 
            outline: 3px solid #ff5722 !important;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div id="status-bar">🚀 正在同步最新行程...</div>
    <div id="content"></div>

    <script>
        // 填入你剛才在 Google Apps Script 取得的部署網址
        const gasUrl = "將這段文字替換為你的_SCRIPT_URL";

        async function loadItinerary() {
            try {
                const response = await fetch(gasUrl);
                const html = await response.text();
                
                // 解析 HTML
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                
                // 複製樣式與內容
                const styles = doc.querySelectorAll('style');
                styles.forEach(s => document.head.appendChild(s.cloneNode(true)));
                document.getElementById('content').innerHTML = doc.querySelector('body').innerHTML;

                // 定位日期
                scrollToToday();
            } catch (err) {
                console.error(err);
                document.getElementById('status-bar').innerText = "連線失敗，請檢查網路或 GAS 部署設定";
            }
        }

        function scrollToToday() {
            const now = new Date();
            const m = now.getMonth() + 1;
            const d = now.getDate();
            const yyyy = now.getFullYear();
            
            // 產生日期的各種變體
            const todayStr = [
                `${m}/${d}`, `${m.toString().padStart(2,'0')}/${d.toString().padStart(2,'0')}`,
                `${m}月${d}日`, `${yyyy}/${m}/${d}`
            ];

            const cells = document.querySelectorAll('td');
            let target = null;

            for (let cell of cells) {
                let cellText = cell.innerText.trim();
                // 移除星期幾的干擾
                let cleanText = cellText.replace(/\s*\(.*?\)\s*/g, '').replace(/\s*（.*?）\s*/g, '').trim();

                if (todayStr.includes(cleanText)) {
                    target = cell;
                    break;
                }
            }

            if (target) {
                target.classList.add('today-highlight');
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                document.getElementById('status-bar').innerText = `已自動定位到今天 (${m}/${d})`;
                setTimeout(() => document.getElementById('status-bar').style.transform = 'translateY(-100%)', 3000);
            } else {
                document.getElementById('status-bar').innerText = "今日不在旅遊行程範圍內";
                setTimeout(() => document.getElementById('status-bar').style.transform = 'translateY(-100%)', 3000);
            }
        }

        loadItinerary();
    </script>
</body>
</html>
